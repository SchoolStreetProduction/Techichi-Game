<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Techichi - Strażnik Gór</title>
  <style>
    :root { color-scheme: light; }
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    body { display: grid; place-items: center; background: #f6f7fb; }
    .wrap { width: min(980px, 96vw); }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap: 12px; margin: 10px 0 8px; }
    .title { font-weight: 700; }
    .hint { font-size: 14px; opacity: .8; line-height: 1.25; }
    canvas { width: 100%; height: auto; border-radius: 16px; box-shadow: 0 10px 28px rgba(0,0,0,.08); background: #cfefff; touch-action: none; }
    .controls { display:flex; gap: 10px; flex-wrap: wrap; margin: 10px 0 14px; }
    button { border: 0; border-radius: 12px; padding: 10px 14px; background: #111827; color: white; font-weight: 650; cursor: pointer; }
    button.secondary { background:#e5e7eb; color:#111827; }
    .pill { font-size: 13px; padding: 6px 10px; border-radius: 999px; background:#ffffffcc; border: 1px solid #ffffff; backdrop-filter: blur(6px); }

    /* TOUCH CONTROLS */
    .touch {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      display: none;
      padding: 14px;
      gap: 12px;
      justify-content: space-between;
      align-items: flex-end;
      z-index: 50;
      pointer-events: none;
    }
    .touch .group { display: flex; gap: 12px; pointer-events: auto; }
    .touch button {
      width: 74px; height: 74px;
      border-radius: 18px;
      font-size: 16px;
      font-weight: 700;
      opacity: 0.92;
      touch-action: none;
    }
    @media (max-width: 820px), (pointer: coarse) {
      .touch { display: flex; }
      body { padding-bottom: 120px; }
    }

    /* START SCREEN (PLAKAT) */
    #splash, #midPoster {
      position: fixed;
      inset: 0;
      background: #0b1220;
      display: grid;
      place-items: center;
      z-index: 9999;
      cursor: pointer;
    }
    #midPoster { display: none; }

    #splash .frame, #midPoster .frame{
      width: min(980px, 96vw);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
      position: relative;
    }
    #splash img, #midPoster img{
      display: block;
      width: 60%;
      max-width: 500px;
      height: auto;
      margin: 0 auto;
    }
    #splash .cta, #midPoster .cta{
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(17,24,39,.80);
      color: #fff;
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(6px);
    }
    #splash .hint2, #midPoster .hint2{
      position: absolute;
      left: 50%;
      top: 14px;
      transform: translateX(-50%);
      font-size: 13px;
      opacity: .9;
      color: #fff;
      background: rgba(255,255,255,0.10);
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
    }
  </style>
</head>
<body>
  <div id="splash" aria-label="Ekran startowy">
    <div class="frame">
      <img src="./plakat.png" alt="Plakat Techichi" />
      <div class="hint2">Kliknij, aby rozpocząć</div>
      <div class="cta">🎮 Start</div>
    </div>
  </div>

  <!-- PLAKAT po rundzie 5 -->
  <div id="midPoster" aria-label="Plakat po rundzie 5">
    <div class="frame">
      <img src="./plakat2.png" alt="Plakat - Połowa drogi" />
      <div class="hint2">Kliknij, aby kontynuować</div>
      <div class="cta">🏁 Dalej</div>
    </div>
  </div>

  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="title">Techichi - Strażnik Gór</div>
        <div class="hint">Sterowanie: ← → (ruch), Spacja (skok). Zbieraj oscypki. Uważaj na koty i wodę.</div>
      </div>
      <div class="pill" id="statusPill">Kliknij plakat, aby zacząć</div>
    </div>

    <canvas id="game" width="960" height="540" aria-label="Gra Techichi - Strażnik Gór"></canvas>

    <div class="controls">
      <button id="restartBtn">Restart rundy</button>
      <button class="secondary" id="toggleBtn">Pauza</button>
      <button class="secondary" id="musicBtn">Muzyka: ON</button>
    </div>
  </div>

  <div class="touch">
    <div class="group">
      <button id="btnLeft"  class="secondary">◀</button>
      <button id="btnRight" class="secondary">▶</button>
    </div>
    <div class="group">
      <button id="btnJump">SKOK</button>
    </div>
  </div>

<script>
(() => {
  "use strict";

  if (window.__TECHICHI_RUNNING__) return;
  window.__TECHICHI_RUNNING__ = true;

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const statusPill = document.getElementById("statusPill");
  const restartBtn = document.getElementById("restartBtn");
  const toggleBtn  = document.getElementById("toggleBtn");
  const musicBtn   = document.getElementById("musicBtn");
  const splash     = document.getElementById("splash");
  const midPoster  = document.getElementById("midPoster");

  const W = canvas.width, H = canvas.height;

  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const aabb = (a, b) =>
    a.x < b.x + b.w && a.x + a.w > b.x &&
    a.y < b.y + b.h && a.y + a.h > b.y;

  // ========= Audio =========
  let audioCtx = null;
  let musicOn = true;
  let musicTimer = null;
  let masterGain = null;

  function ensureAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.35;
    masterGain.connect(audioCtx.destination);
  }

  function setMusicButton() {
    musicBtn.textContent = musicOn ? "Muzyka: ON" : "Muzyka: OFF";
  }

  function beep({freq=440, dur=0.12, type="sine", gain=0.12}) {
    if (!audioCtx) return;
    const t0 = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  }

  function noiseSplash(dur=0.18) {
    if (!audioCtx) return;
    const t0 = audioCtx.currentTime;
    const bufferSize = Math.floor(audioCtx.sampleRate * dur);
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i=0; i<bufferSize; i++) data[i] = (Math.random()*2 - 1) * (1 - i/bufferSize);

    const src = audioCtx.createBufferSource();
    src.buffer = buffer;

    const filter = audioCtx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.setValueAtTime(1200, t0);

    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(0.22, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);

    src.connect(filter);
    filter.connect(g);
    g.connect(masterGain);
    src.start(t0);
    src.stop(t0 + dur);
  }

  const melody = [
    { f: 523.25, d: 0.16 }, { f: 659.25, d: 0.16 }, { f: 783.99, d: 0.16 }, { f: 659.25, d: 0.16 },
    { f: 587.33, d: 0.16 }, { f: 698.46, d: 0.16 }, { f: 880.00, d: 0.16 }, { f: 698.46, d: 0.16 },
  ];
  let melodyIdx = 0;

  function startMusic() {
    if (!audioCtx || !musicOn) return;
    if (musicTimer) return;
    melodyIdx = 0;
    const step = () => {
      if (!musicOn || !audioCtx) return;
      const note = melody[melodyIdx % melody.length];
      beep({ freq: note.f, dur: note.d, type: "triangle", gain: 0.08 });
      beep({ freq: 110, dur: 0.05, type: "square", gain: 0.02 });
      melodyIdx++;
      musicTimer = setTimeout(step, Math.floor(note.d * 1000));
    };
    step();
  }
  function stopMusic() {
    if (musicTimer) { clearTimeout(musicTimer); musicTimer = null; }
  }
  function toggleMusic() {
    ensureAudio();
    if (audioCtx.state === "suspended") audioCtx.resume();
    musicOn = !musicOn;
    setMusicButton();
    if (musicOn) startMusic(); else stopMusic();
  }

  function unlockAudioOnce() {
    ensureAudio();
    if (audioCtx.state === "suspended") audioCtx.resume();
    if (musicOn) startMusic();
    window.removeEventListener("pointerdown", unlockAudioOnce);
    window.removeEventListener("keydown", unlockAudioOnce);
  }
  window.addEventListener("pointerdown", unlockAudioOnce);
  window.addEventListener("keydown", unlockAudioOnce);

  musicBtn.addEventListener("click", toggleMusic);
  setMusicButton();

  // ========= State =========
  let paused = true;
  let gameOver = false;
  function setStatus(text) { statusPill.textContent = text; }

  // ========= TIME =========
  const ROUND_TIME_DEFAULT = 30;
  const ROUND_TIME_L4 = 45;
  let roundTime = ROUND_TIME_DEFAULT;
  let timeLeft = roundTime;

  // ========= REQUIREMENTS (oscypki in THIS round) =========
  const REQUIRED_OSCYPKI = { 1: 5, 2: 8, 3: 10, 4: 10, 5: 10 };
  function requiredForLevel(lvl) { return REQUIRED_OSCYPKI[lvl] ?? 0; }

  function resetRoundTimer() { timeLeft = roundTime; }
  function formatTimeLeft() {
    const s = Math.max(0, Math.ceil(timeLeft));
    return String(s).padStart(2, "0") + "s";
  }

  function livesToHearts(n) {
    if (n <= 0) return "💔";
    return "❤️".repeat(n);
  }

  // ========= Input + Start from Splash =========
  const keys = new Set();
  let started = false;

  // ========= World =========
  const WATER_Y = 495;

  const basePlatforms = [
    { x: 0,   y: 420, w: 360, h: 22 },
    { x: 220, y: 360, w: 220, h: 22 },
    { x: 520, y: 300, w: 240, h: 22 },
    { x: 860, y: 340, w: 190, h: 22 },
    { x: 1180,y: 280, w: 260, h: 22 },
    { x: 1540,y: 330, w: 220, h: 22 },
    { x: 1880,y: 270, w: 260, h: 22 },
    { x: 2220,y: 340, w: 220, h: 22 },
    { x: 2520,y: 390, w: 160, h: 22 },
  ];

  let platforms = basePlatforms.map(p => ({ ...p }));
  let platformT = 0;

  let level = 1;
  let bullets = [];
  let cats = [];
  let collectibles = [];

  // ====== SPIKES (only level 5) ======
  let spikes = [];

  function spikeOn(pIndex, xOffset, w=28, h=16) {
    return { platformIndex: pIndex, xOffset, w, h };
  }
  function getSpikeRect(s) {
    const p = platforms[s.platformIndex];
    const x = clamp(p.x + s.xOffset, p.x + 10, p.x + p.w - s.w - 10);
    const y = p.y - s.h;
    return { x, y, w: s.w, h: s.h };
  }

  function updatePlatforms(dt) {
    const prev = platforms;
    platforms = basePlatforms.map(p => ({ ...p }));

    if (level !== 4 && level !== 5) return;

    platformT += dt;

    const movingIdx = [1, 3, 5, 7];
    for (const i of movingIdx) {
      const p = platforms[i];
      const base = basePlatforms[i];
      const amp = 70;
      const spd = 1.2;
      const phase = i * 0.9;
      p.x = base.x + Math.sin(platformT * spd + phase) * amp;
    }

    for (const c of cats) {
      if (!c.alive) continue;
      const idx = c.platformIndex;
      const oldP = prev[idx];
      const newP = platforms[idx];
      if (oldP && newP) c.x += (newP.x - oldP.x);
    }
  }

  const hut = {
    x: 2605, y: 280, w: 170, h: 170,
    door: { x: 2670, y: 345, w: 55, h: 85 },
  };

  const hutOscypki = [
    { x: hut.x + 55, y: hut.y + 118, r: 10 },
    { x: hut.x + 82, y: hut.y + 112, r: 10 },
    { x: hut.x + 108,y: hut.y + 118, r: 10 },
  ];

  const camera = { x: 0, y: 0 };

  // ========= Player =========
  const playerStart = { x: 60, y: 320 };
  const player = {
    x: playerStart.x, y: playerStart.y,
    w: 46, h: 34,
    vx: 0, vy: 0,
    onGround: false,
    face: 1,
    alive: true,
    won: false,
    lives: 3,
    invuln: 0,

    // Wyniki:
    totalScore: 0,
    roundScore: 0,

    lastFace: 1
  };

  // ========= Effects =========
  const heartFx = { active: false, x: 0, y: 0, t: 0 };
  let splashes = [];
  let smoke = [];

  function spawnSplash(worldX, worldY) {
    for (let i=0; i<16; i++) {
      splashes.push({
        x: worldX + (Math.random()*24 - 12),
        y: worldY,
        vx: (Math.random()*2 - 1) * 2.2,
        vy: - (2.5 + Math.random()*3.5),
        r: 2 + Math.random()*2,
        a: 0.9,
        life: 40 + Math.floor(Math.random()*10)
      });
    }
    ensureAudio();
    if (audioCtx.state === "suspended") audioCtx.resume();
    noiseSplash(0.18);
  }

  function spawnSmoke() {
    const chimneyX = hut.x + 130;
    const chimneyY = hut.y + 20;
    smoke.push({
      x: chimneyX + (Math.random()*6 - 3),
      y: chimneyY,
      r: 6 + Math.random()*6,
      a: 0.55 + Math.random()*0.2,
      vx: 0.2 + Math.random()*0.3,
      vy: -0.6 - Math.random()*0.6,
      life: 120 + Math.floor(Math.random()*40)
    });
    if (smoke.length > 80) smoke.shift();
  }

  // ========= Enemies =========
  function makeCatOnPlatform(platformIndex, x, dir, kind="gray") {
    const p = platforms[platformIndex];
    const w = 40, h = 28;
    const safeX = clamp(x, p.x + 8, p.x + p.w - w - 8);
    return {
      platformIndex,
      x: safeX,
      y: p.y - h,
      w, h,
      vx: 1.05 * dir,
      alive: true,
      shootCd: 9999,
      kind
    };
  }

  function spawnBulletLeft(fromCat) {
    const bx = fromCat.x - 2;
    const by = fromCat.y + fromCat.h * 0.55;
    const speed = 3.0;
    bullets.push({ x: bx, y: by, vx: -speed, vy: 0, r: 5, life: 320 });
  }

  function updateBullets() {
    const pb = { x: player.x, y: player.y, w: player.w, h: player.h };

    for (const b of bullets) {
      b.x += b.vx;
      b.y += b.vy;
      b.life--;

      if (b.y > WATER_Y) b.life = 0;

      const bb = { x: b.x - b.r, y: b.y - b.r, w: b.r * 2, h: b.r * 2 };
      if (player.alive && player.invuln <= 0 && aabb(pb, bb)) {
        b.life = 0;
        loseLife("Pocisk kota");
      }
    }
    bullets = bullets.filter(b => b.life > 0);
  }

  function drawBullets() {
    for (const b of bullets) {
      const x = b.x - camera.x;
      const y = b.y - camera.y;

      ctx.fillStyle = "rgba(17,24,39,0.92)";
      ctx.beginPath();
      ctx.arc(x, y, b.r, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.35)";
      ctx.beginPath();
      ctx.arc(x - 2, y - 2, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  const catsStart = [
    makeCatOnPlatform(2, 560,  1),
    makeCatOnPlatform(5, 1600, -1),
    makeCatOnPlatform(7, 2300,  1),
  ];

  const catsL5Start = [
    makeCatOnPlatform(2, 560,  1, "yellow"),
    makeCatOnPlatform(5, 1600, -1, "yellow"),
    makeCatOnPlatform(7, 2300,  1, "yellow"),
  ];

  const catsL3Start = basePlatforms.map((p, idx) => {
    const dir = (idx % 2 === 0) ? 1 : -1;
    const x = p.x + p.w * 0.5;
    return makeCatOnPlatform(idx, x, dir);
  });

  // ========= Oscypki =========
  function onTopOf(pIndex, xOffset, r=10) {
    return { platformIndex: pIndex, xOffset, r, taken: false };
  }

  function getCollectPos(o) {
    const p = platforms[o.platformIndex];
    const x = clamp(p.x + o.xOffset, p.x + 14, p.x + p.w - 14);
    const y = p.y - (o.r + 2);
    return { x, y, r: o.r };
  }

  const collectiblesStart = [
    onTopOf(0,  70), onTopOf(0, 140), onTopOf(0, 210),
    onTopOf(1,  40), onTopOf(1, 120),
    onTopOf(2,  40), onTopOf(2, 120), onTopOf(2, 200),
    onTopOf(3,  50), onTopOf(3, 120),
    onTopOf(4,  60), onTopOf(4, 160),
    onTopOf(5,  60),
    onTopOf(6,  90),
  ];

  const collectiblesL2Start = [
    onTopOf(0, 300),
    onTopOf(1, 170),
    onTopOf(2,  80),
    onTopOf(3,  90),
    onTopOf(4, 220),
    onTopOf(5, 140),
    onTopOf(6, 170),
    onTopOf(7,  60),
    onTopOf(7, 140),
    onTopOf(8,  60),
    onTopOf(2, 210),
    onTopOf(4,  90),
    onTopOf(6,  70),
    onTopOf(5,  90),
  ];

  const collectiblesL3Start = [
    onTopOf(0,  30), onTopOf(0, 180),
    onTopOf(1,  20), onTopOf(1, 190),
    onTopOf(2,  20), onTopOf(2,  90), onTopOf(2, 160),
    onTopOf(3,  20), onTopOf(3, 140),
    onTopOf(4,  30), onTopOf(4, 200),
    onTopOf(5, 110),
    onTopOf(6, 210),
    onTopOf(8,  90),
  ];

  const collectiblesL4Start = [
    onTopOf(0,  40), onTopOf(0, 210),
    onTopOf(1,  30), onTopOf(1, 160),
    onTopOf(2,  50), onTopOf(2, 190),
    onTopOf(3,  40), onTopOf(3, 130),
    onTopOf(4,  60), onTopOf(4, 200),
    onTopOf(5,  60), onTopOf(5, 160),
    onTopOf(7,  60), onTopOf(7, 150),
  ];

  const collectiblesL5Start = [
    onTopOf(0,  80), onTopOf(1,  70),
    onTopOf(2,  60), onTopOf(2, 180),
    onTopOf(3,  60), onTopOf(4, 120),
    onTopOf(5,  70), onTopOf(6, 120),
    onTopOf(7,  70), onTopOf(8,  80),
  ];

  const spikesL5Start = [
    spikeOn(1, 120),
    spikeOn(2, 120),
    spikeOn(4, 80),
    spikeOn(5, 140),
    spikeOn(7, 120),
  ];

  function collectCheck() {
    const pb = { x: player.x, y: player.y, w: player.w, h: player.h };
    for (const o of collectibles) {
      if (o.taken) continue;
      const pos = getCollectPos(o);
      const ob = { x: pos.x - pos.r, y: pos.y - pos.r, w: pos.r*2, h: pos.r*2 };
      if (aabb(pb, ob)) {
        o.taken = true;
        player.roundScore += 1;
        player.totalScore += 1;

        ensureAudio();
        if (audioCtx && audioCtx.state !== "suspended") {
          beep({ freq: 988, dur: 0.06, type:"triangle", gain: 0.07 });
          setTimeout(() => beep({ freq: 1175, dur: 0.07, type:"triangle", gain: 0.06 }), 55);
        }
      }
    }
  }

  function spikeCheck() {
    if (level !== 5) return;
    if (!player.alive || player.won) return;
    if (player.invuln > 0) return;

    const pb = { x: player.x, y: player.y, w: player.w, h: player.h };
    for (const s of spikes) {
      const r = getSpikeRect(s);
      if (aabb(pb, r)) {
        loseLife("Kolce");
        return;
      }
    }
  }

  // ========= Physics =========
  const GRAV = 0.55;
  const MOVE_ACC = 0.55;
  const MAX_SPEED = 4.2;
  const FRICTION = 0.82;
  const JUMP = 11.2;

  function onTimeOut() {
    if (gameOver || paused) return;
    if (!player.alive || player.won) return;

    loseLife("Czas minął");

    if (!gameOver && player.alive) {
      player.x = playerStart.x;
      player.y = playerStart.y;
      player.vx = 0; player.vy = 0;
      player.onGround = false;
      player.invuln = 60;
      resetRoundTimer();
    }
  }

  function showMidPoster() {
    paused = true;
    gameOver = true;
    if (midPoster) midPoster.style.display = "grid";
    setStatus("Połowa drogi! Kliknij plakat, aby wrócić do startu.");
  }

  function hideMidPoster() {
    if (midPoster) midPoster.style.display = "none";
  }

  function startLevel(nr) {
    level = nr;

    // czas rundy: 4 i 5 = 45, reszta 30
    roundTime = (level === 4 || level === 5) ? ROUND_TIME_L4 : ROUND_TIME_DEFAULT;

    player.x = playerStart.x;
    player.y = playerStart.y;
    player.vx = 0; player.vy = 0;
    player.onGround = false;
    player.won = false;
    player.alive = true;
    player.invuln = 60;

    // resetuje się tylko CEL (runda)
    player.roundScore = 0;

    bullets = [];
    spikes = [];
    resetRoundTimer();

    if (level === 1) {
      cats = catsStart.map(c => ({ ...c, shootCd: 9999, kind: c.kind ?? "gray" }));
      collectibles = collectiblesStart.map(o => ({ ...o }));
      platformT = 0;
    }

    if (level === 2) {
      cats = catsStart.map(c => ({ ...c, shootCd: 120 + Math.floor(Math.random() * 140), kind: c.kind ?? "gray" }));
      collectibles = collectiblesL2Start.map(o => ({ ...o }));
    }

    if (level === 3) {
      cats = catsL3Start.map(c => ({ ...c, shootCd: 9999, kind: c.kind ?? "gray" }));
      bullets = [];
      collectibles = collectiblesL3Start.map(o => ({ ...o }));
    }

    if (level === 4) {
      cats = catsStart.map(c => ({ ...c, shootCd: 120 + Math.floor(Math.random() * 140), kind: c.kind ?? "gray" }));
      bullets = [];
      platformT = 0;
      collectibles = collectiblesL4Start.map(o => ({ ...o }));
    }

    if (level === 5) {
      cats = catsL5Start.map(c => ({ ...c, shootCd: 9999, kind: "yellow" }));
      bullets = [];
      platformT = 0;
      collectibles = collectiblesL5Start.map(o => ({ ...o }));
      spikes = spikesL5Start.map(s => ({ ...s }));
    }

    gameOver = false;
    paused = false;
    toggleBtn.textContent = "Pauza";
    setStatus("Runda: " + level);
  }

  function startFromSplash() {
    if (started) return;
    started = true;

    hideMidPoster();
    if (splash) splash.style.display = "none";
    startLevel(1);
    paused = false;
    toggleBtn.textContent = "Pauza";
    setStatus("Runda: 1");
    unlockAudioOnce();
  }

  if (splash) splash.addEventListener("pointerdown", startFromSplash);

  if (midPoster) midPoster.addEventListener("pointerdown", () => {
    hideMidPoster();
    reset();
  });

  const btnLeft  = document.getElementById("btnLeft");
  const btnRight = document.getElementById("btnRight");
  const btnJump  = document.getElementById("btnJump");

  function bindHold(btn, code) {
    if (!btn) return;
    const down = (e) => { e.preventDefault(); startFromSplash(); keys.add(code); };
    const up   = (e) => { e.preventDefault(); keys.delete(code); };
    btn.addEventListener("pointerdown", down);
    btn.addEventListener("pointerup", up);
    btn.addEventListener("pointercancel", up);
    btn.addEventListener("pointerleave", up);
  }
  bindHold(btnLeft, "ArrowLeft");
  bindHold(btnRight, "ArrowRight");
  bindHold(btnJump, "Space");

  window.addEventListener("keydown", (e) => {
    if (["ArrowLeft","ArrowRight","Space","KeyP","ArrowUp","KeyR","Enter"].includes(e.code)) e.preventDefault();
    if (!started && (e.code === "Enter" || e.code === "Space")) startFromSplash();

    keys.add(e.code);
    if (e.code === "KeyP") togglePause();
    if (e.code === "KeyR") reset();
  }, { passive: false });

  window.addEventListener("keyup", (e) => keys.delete(e.code));

  function togglePause() {
    if (gameOver) return;
    paused = !paused;
    toggleBtn.textContent = paused ? "Wznów" : "Pauza";
    setStatus(paused ? "Pauza" : "Gramy");
  }
  toggleBtn.addEventListener("click", togglePause);

  // ========= Reset całej gry (przycisk + R) =========
  function reset() {
    player.x = playerStart.x; player.y = playerStart.y;
    player.vx = 0; player.vy = 0;
    player.onGround = false;
    player.face = 1;
    player.lastFace = 1;
    player.alive = true; player.won = false;
    player.lives = 3;
    player.invuln = 0;

    // reset wyników:
    player.roundScore = 0;
    player.totalScore = 0;

    level = 1;

    roundTime = ROUND_TIME_DEFAULT;
    timeLeft = roundTime;

    bullets = [];
    spikes = [];
    cats = catsStart.map(c => ({...c, shootCd: 9999, kind: c.kind ?? "gray" }));
    collectibles = collectiblesStart.map(o => ({...o}));

    platforms = basePlatforms.map(p => ({ ...p }));
    platformT = 0;

    smoke = [];
    splashes = [];
    gameOver = false;

    resetRoundTimer();

    paused = true;
    started = false;

    hideMidPoster();
    if (splash) splash.style.display = "grid";
    toggleBtn.textContent = "Pauza";
    heartFx.active = false;
    setStatus("Kliknij plakat, aby zacząć");
  }

  restartBtn.addEventListener("click", reset);

  function resolvePlatforms(entity) {
    entity.onGround = false;

    entity.x += entity.vx;
    for (const p of platforms) {
      if (aabb(entity, p)) {
        if (entity.vx > 0) entity.x = p.x - entity.w;
        else if (entity.vx < 0) entity.x = p.x + p.w;
        entity.vx = 0;
      }
    }

    entity.y += entity.vy;
    for (const p of platforms) {
      if (aabb(entity, p)) {
        if (entity.vy > 0) {
          entity.y = p.y - entity.h;
          entity.vy = 0;
          entity.onGround = true;
        } else if (entity.vy < 0) {
          entity.y = p.y + p.h;
          entity.vy = 0;
        }
      }
    }
  }

  function updatePlayer() {
    if (!player.alive || player.won) return;

    const left = keys.has("ArrowLeft");
    const right = keys.has("ArrowRight");
    const jump = keys.has("Space") || keys.has("ArrowUp");

    if (left)  player.vx -= MOVE_ACC;
    if (right) player.vx += MOVE_ACC;

    player.vx = clamp(player.vx, -MAX_SPEED, MAX_SPEED);
    if (!left && !right) player.vx *= FRICTION;

    if (Math.abs(player.vx) > 0.25) {
      player.face = (player.vx > 0) ? 1 : -1;
      player.lastFace = player.face;
    } else {
      player.face = player.lastFace;
    }

    if (jump && player.onGround) {
      player.vy = -JUMP;
      player.onGround = false;
      ensureAudio();
      if (audioCtx && audioCtx.state !== "suspended") beep({ freq: 740, dur: 0.07, type:"sine", gain: 0.05 });
    }

    player.vy += GRAV;
    player.vy = clamp(player.vy, -999, 14);

    resolvePlatforms(player);
    spikeCheck();
    collectCheck();

    // woda / lawa = strata życia + respawn
    if (player.y + player.h > WATER_Y) {
      spawnSplash(player.x + player.w/2, WATER_Y);
      loseLife(level === 5 ? "Wpadłeś do lawy" : "Wpadłeś do wody");

      if (player.alive) {
        player.x = playerStart.x;
        player.y = playerStart.y;
        player.vx = 0; player.vy = 0;
        player.onGround = false;
        player.invuln = 60;
        resetRoundTimer();
      }
    }

    // drzwi chaty = przejście rundy (jeśli CEL spełniony)
    const doorBox = { x: hut.door.x, y: hut.door.y, w: hut.door.w, h: hut.door.h };
    if (!player.won && aabb(player, doorBox)) {
      const need = requiredForLevel(level);

      if (player.roundScore >= need) {
        if (level === 1) startLevel(2);
        else if (level === 2) startLevel(3);
        else if (level === 3) startLevel(4);
        else if (level === 4) startLevel(5);
        else if (level === 5) showMidPoster();
        else win();
      } else {
        const missing = need - player.roundScore;
        setStatus(`Za mało oscypków: brakuje ${missing} (wymagane ${need})`);
      }
    }

    if (player.invuln > 0) player.invuln--;
  }

  function updateCats() {
    for (const c of cats) {
      if (!c.alive) continue;

      const p = platforms[c.platformIndex];
      c.y = p.y - c.h;

      // strzelanie w rundzie 2 i 4
      if (level === 2 || level === 4) {
        c.shootCd--;
        if (c.shootCd <= 0 && player.alive && !player.won) {
          spawnBulletLeft(c);
          c.shootCd = 130 + Math.floor(Math.random() * 170);
        }
      }

      c.x += c.vx;
      const leftEdge = p.x + 6;
      const rightEdge = p.x + p.w - c.w - 6;

      if (c.x < leftEdge) { c.x = leftEdge; c.vx *= -1; }
      if (c.x > rightEdge) { c.x = rightEdge; c.vx *= -1; }

      if (!player.alive || player.won) continue;
      if (player.invuln > 0) continue;

      if (aabb(player, c)) {
        const playerBottom = player.y + player.h;
        const catTop = c.y;
        const falling = player.vy > 0.5;

        if (falling && (playerBottom - catTop) < 14) {
          c.alive = false;
          player.vy = -8.5;
          ensureAudio();
          if (audioCtx && audioCtx.state !== "suspended") beep({ freq: 980, dur: 0.09, type:"triangle", gain: 0.06 });
        } else {
          loseLife("Kot Cię dotknął");
        }
      }
    }
  }

  function loseLife(reason) {
    if (player.invuln > 0 || player.won || !player.alive) return;

    player.lives -= 1;

    heartFx.active = true;
    heartFx.x = player.x + player.w/2;
    heartFx.y = player.y - 10;
    heartFx.t = 40;

    ensureAudio();
    if (audioCtx && audioCtx.state !== "suspended") {
      beep({ freq: 220, dur: 0.12, type:"sawtooth", gain: 0.06 });
      setTimeout(() => beep({ freq: 196, dur: 0.14, type:"sawtooth", gain: 0.05 }), 60);
    }

    player.invuln = 90;
    player.vx = -2.6 * player.face;
    player.vy = -6;

    player.x = clamp(player.x, 0, 2700 - player.w);
    player.y = clamp(player.y, 0, WATER_Y - player.h - 2);

    if (player.lives <= 0) {
      player.alive = false;
      gameOver = true;
      setStatus("Przegrana - brak serc. Restart?");
      return;
    }

    setStatus(reason + " - zostało: " + livesToHearts(player.lives));
  }

  function win() {
    player.won = true;
    gameOver = true;
    setStatus("Wygrana - masz oscypki! Restart?");
    ensureAudio();
    if (audioCtx && audioCtx.state !== "suspended") {
      beep({ freq: 784, dur: 0.12, type:"triangle", gain: 0.07 });
      setTimeout(() => beep({ freq: 988, dur: 0.14, type:"triangle", gain: 0.08 }), 120);
      setTimeout(() => beep({ freq: 1175, dur: 0.16, type:"triangle", gain: 0.08 }), 260);
    }
  }

  // ========= Drawing =========
  function drawBackground() {
    if (level === 3) { drawCaveBackground(); drawWater(); return; }
    if (level === 4) { drawBieszczadyBackground(); drawWater(); return; }
    if (level === 5) { drawCaveBackground(); drawLava(); return; }

    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, "#cfefff");
    g.addColorStop(1, "#f7fbff");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    ctx.beginPath();
    ctx.arc(120, 90, 40, 0, Math.PI*2);
    ctx.fillStyle = "rgba(255, 228, 120, 0.95)";
    ctx.fill();

    drawMountain(120, 410, 420, 220, "rgba(120,160,200,0.55)");
    drawMountain(360, 430, 520, 260, "rgba(110,150,195,0.55)");
    drawMountain(650, 410, 520, 240, "rgba(95,140,185,0.55)");
    drawMountain(900, 440, 620, 280, "rgba(85,130,175,0.50)");

    drawWater();
  }

  function drawBieszczadyBackground() {
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0, "#cfefff");
    g.addColorStop(1, "#f6fff8");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    ctx.beginPath();
    ctx.arc(150, 90, 42, 0, Math.PI*2);
    ctx.fillStyle = "rgba(255, 230, 140, 0.95)";
    ctx.fill();

    drawHillBand(0.78, "rgba(85, 160, 120, 0.55)", 12, 0.9);
    drawHillBand(0.86, "rgba(70, 145, 105, 0.60)", 10, 1.1);
    drawHillBand(0.93, "rgba(60, 130, 95, 0.70)", 8,  1.3);

    ctx.fillStyle = "rgba(255,255,255,0.55)";
    for (let i=0; i<8; i++) {
      const x = 120 + i*110 + Math.sin((Date.now()/1200)+i)*10;
      const y = 50 + (i%2)*14;
      ctx.beginPath();
      ctx.ellipse(x, y, 46, 18, 0, 0, Math.PI*2);
      ctx.ellipse(x+34, y+6, 38, 14, 0, 0, Math.PI*2);
      ctx.ellipse(x-30, y+8, 34, 13, 0, 0, Math.PI*2);
      ctx.fill();
    }
  }

  function drawHillBand(yNorm, color, bumps, speed) {
    const baseY = H * yNorm;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(0, H);
    ctx.lineTo(0, baseY);

    for (let i=0; i<=bumps; i++) {
      const x = (i/bumps) * W;
      const wobble = Math.sin((Date.now()/1400)*speed + i*0.9) * 8;
      const yy = baseY - 18 - Math.sin(i*0.8) * 22 + wobble;
      ctx.quadraticCurveTo(x - (W/bumps)/2, yy, x, baseY);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();
  }

  function drawCaveBackground() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#1a1f2a");
    g.addColorStop(0.55, "#242a36");
    g.addColorStop(1, "#121621");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    ctx.fillStyle = "rgba(255,255,255,0.04)";
    for (let i=0; i<10; i++) {
      const x = i * (W/9) + (Math.sin((Date.now()/900) + i) * 8);
      const y = 40 + (i%2)*14;
      ctx.beginPath();
      ctx.moveTo(x - 90, y + 10);
      ctx.quadraticCurveTo(x - 30, y - 40, x + 30, y - 10);
      ctx.quadraticCurveTo(x + 80, y + 20, x + 120, y + 6);
      ctx.quadraticCurveTo(x + 30, y + 40, x - 90, y + 10);
      ctx.fill();
    }

    for (let i=0; i<140; i++) {
      const rx = (i * 73) % W;
      const ry = 70 + ((i * 191) % (H - 120));
      const r  = 6 + ((i * 17) % 14);

      const shade = 0.035 + ((i % 7) * 0.007);
      ctx.fillStyle = `rgba(255,255,255,${shade})`;
      ctx.beginPath();
      ctx.ellipse(rx, ry, r*1.4, r, (i%9)*0.2, 0, Math.PI*2);
      ctx.fill();
    }

    const glow = ctx.createRadialGradient(W*0.55, H*0.35, 10, W*0.55, H*0.35, 360);
    glow.addColorStop(0, "rgba(120,180,255,0.10)");
    glow.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = glow;
    ctx.fillRect(0,0,W,H);
  }

  function drawWater() {
    const y = WATER_Y - camera.y;
    const waterG = ctx.createLinearGradient(0, y, 0, H);
    waterG.addColorStop(0, "rgba(70, 160, 220, 0.55)");
    waterG.addColorStop(1, "rgba(30, 120, 190, 0.75)");
    ctx.fillStyle = waterG;
    ctx.fillRect(0, y, W, H - y);

    ctx.strokeStyle = "rgba(255,255,255,0.25)";
    ctx.lineWidth = 2;
    for (let i=0; i<18; i++) {
      const xx = (i*60 + ((Date.now()/18) % 60));
      ctx.beginPath();
      ctx.arc(xx, y + 18, 18, 0.15*Math.PI, 0.85*Math.PI);
      ctx.stroke();
    }
  }

  function drawLava() {
    const y = WATER_Y - camera.y;
    const lavaG = ctx.createLinearGradient(0, y, 0, H);
    lavaG.addColorStop(0, "rgba(255, 120, 40, 0.65)");
    lavaG.addColorStop(1, "rgba(180, 30, 10, 0.88)");
    ctx.fillStyle = lavaG;
    ctx.fillRect(0, y, W, H - y);

    ctx.fillStyle = "rgba(255,220,120,0.22)";
    for (let i=0; i<14; i++) {
      const xx = (i*70 + ((Date.now()/14) % 70));
      const rr = 10 + (i%3)*4;
      ctx.beginPath();
      ctx.arc(xx, y + 24 + (i%2)*10, rr, 0, Math.PI*2);
      ctx.fill();
    }
  }

  function drawMountain(cx, baseY, width, height, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(cx - width/2, baseY);
    ctx.lineTo(cx, baseY - height);
    ctx.lineTo(cx + width/2, baseY);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "rgba(255,255,255,0.55)";
    ctx.beginPath();
    ctx.moveTo(cx - width*0.12, baseY - height*0.58);
    ctx.lineTo(cx, baseY - height*0.98);
    ctx.lineTo(cx + width*0.12, baseY - height*0.58);
    ctx.closePath();
    ctx.fill();
  }

  function roundRect(x, y, w, h, r) {
    r = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
  }

  function drawPlatform(p) {
    const x = p.x - camera.x;
    const y = p.y - camera.y;

    roundRect(x, y, p.w, p.h, 8);

    if (level === 4 || level === 5) {
      const stone = ctx.createLinearGradient(0, y, 0, y+p.h);
      stone.addColorStop(0, "#f3f4f6");
      stone.addColorStop(1, "#d1d5db");
      ctx.fillStyle = stone;
      ctx.fill();

      ctx.strokeStyle = "rgba(17,24,39,0.18)";
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.strokeStyle = "rgba(17,24,39,0.10)";
      ctx.lineWidth = 1;
      for (let i=0; i<4; i++) {
        const yy = y + 5 + i*(p.h-10)/3;
        ctx.beginPath();
        ctx.moveTo(x + 10, yy);
        ctx.lineTo(x + p.w - 10, yy);
        ctx.stroke();
      }
      return;
    }

    const wood = ctx.createLinearGradient(0, y, 0, y+p.h);
    wood.addColorStop(0, "#c18b55");
    wood.addColorStop(1, "#a87445");
    ctx.fillStyle = wood;
    ctx.fill();

    ctx.strokeStyle = "rgba(60,30,10,0.22)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.strokeStyle = "rgba(60,30,10,0.12)";
    ctx.lineWidth = 1;
    for (let i=0; i<4; i++) {
      const yy = y + 5 + i*(p.h-10)/3;
      ctx.beginPath();
      ctx.moveTo(x + 10, yy);
      ctx.lineTo(x + p.w - 10, yy);
      ctx.stroke();
    }
  }

  function drawSpikes() {
    for (const s of spikes) {
      const r = getSpikeRect(s);
      const x = r.x - camera.x;
      const y = r.y - camera.y;

      ctx.fillStyle = "#ef4444";
      const tooth = r.w / 3;
      for (let i=0; i<3; i++) {
        ctx.beginPath();
        ctx.moveTo(x + i*tooth, y + r.h);
        ctx.lineTo(x + i*tooth + tooth/2, y);
        ctx.lineTo(x + i*tooth + tooth, y + r.h);
        ctx.closePath();
        ctx.fill();
      }
    }
  }

  function drawOscypek(x, y, r) {
    ctx.fillStyle = "#f4d27a";
    ctx.beginPath();
    ctx.ellipse(x, y, r*1.1, r*0.85, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.strokeStyle = "rgba(120,80,20,0.25)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(x, y, r*0.9, 0.15*Math.PI, 0.85*Math.PI);
    ctx.stroke();
  }

  function drawCollectibles() {
    for (const o of collectibles) {
      if (o.taken) continue;
      const pos = getCollectPos(o);
      drawOscypek(pos.x - camera.x, pos.y - camera.y, pos.r);
    }
  }

  function drawChihuahua(px, py, face) {
    const x = px - camera.x;
    const y = py - camera.y;

    ctx.fillStyle = "rgba(0,0,0,0.10)";
    ctx.beginPath();
    ctx.ellipse(x + 22, y + 33, 16, 6, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#d8b08a";
    ctx.beginPath();
    ctx.ellipse(x + 24, y + 20, 18, 12, 0, 0, Math.PI*2);
    ctx.fill();

    const headX = (face > 0) ? (x + 8) : (x + 40);
    const headY = y + 13;

    ctx.fillStyle = "#e2bf9a";
    ctx.beginPath();
    ctx.ellipse(headX, headY, 14, 12, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#d09f76";
    const ear1X  = (face > 0) ? (x + 4)  : (x + 44);
    const ear2X  = (face > 0) ? (x + 18) : (x + 30);

    ctx.beginPath();
    ctx.ellipse(ear1X, y + 4, 6, 12, face>0 ? -0.35 : 0.35, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(ear2X, y + 2, 6, 12, face>0 ? 0.25 : -0.25, 0, Math.PI*2);
    ctx.fill();

    const snoutX = (face > 0) ? (x - 2) : (x + 48);
    ctx.fillStyle = "#f1dcc3";
    ctx.beginPath();
    ctx.ellipse(snoutX, y + 16, 7, 6, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#2b2b2b";
    ctx.beginPath();
    ctx.arc(snoutX + (face>0 ? -3 : 3), y + 16, 2.6, 0, Math.PI*2);
    ctx.fill();

    const eyeX = (face > 0) ? (x + 12) : (x + 34);
    ctx.fillStyle = "#1f2937";
    ctx.beginPath();
    ctx.arc(eyeX, y + 12, 2.2, 0, Math.PI*2);
    ctx.fill();

    ctx.strokeStyle = "#d8b08a";
    ctx.lineWidth = 4;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(x + 40, y + 18);
    ctx.quadraticCurveTo(x + 46, y + 10, x + 40, y + 6);
    ctx.stroke();

    ctx.strokeStyle = "#ef4444";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(x + 22, y + 14, 10, 0.2*Math.PI, 0.85*Math.PI);
    ctx.stroke();
  }

  function drawCat(c) {
    const x = c.x - camera.x;
    const y = c.y - camera.y;

    ctx.fillStyle = "rgba(0,0,0,0.10)";
    ctx.beginPath();
    ctx.ellipse(x + c.w/2, y + c.h + 2, 14, 5, 0, 0, Math.PI*2);
    ctx.fill();

    let body="#9ca3af", head="#b0b7c3", ear="#9ca3af", tail="#9ca3af";

    if (level === 3) {
      body="#ef4444"; head="#fb7185"; ear="#dc2626"; tail="#ef4444";
    }
    if (c.kind === "yellow") {
      body="#fbbf24"; head="#fde68a"; ear="#f59e0b"; tail="#fbbf24";
    }

    ctx.fillStyle = body;
    ctx.beginPath();
    ctx.ellipse(x + 22, y + 16, 16, 10, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = head;
    ctx.beginPath();
    ctx.ellipse(x + 12, y + 12, 10, 9, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = ear;
    ctx.beginPath();
    ctx.moveTo(x + 5, y + 6);
    ctx.lineTo(x + 10, y + 0);
    ctx.lineTo(x + 14, y + 7);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(x + 14, y + 7);
    ctx.lineTo(x + 18, y + 0);
    ctx.lineTo(x + 22, y + 8);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#111827";
    ctx.beginPath();
    ctx.arc(x + 9, y + 12, 1.8, 0, Math.PI*2);
    ctx.fill();

    ctx.strokeStyle = tail;
    ctx.lineWidth = 4;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(x + 34, y + 18);
    ctx.quadraticCurveTo(x + 44, y + 14, x + 36, y + 8);
    ctx.stroke();
  }

  function drawHut() {
    const x = hut.x - camera.x;
    const y = hut.y - camera.y;

    roundRect(x, y+40, hut.w, hut.h-40, 14);
    const wood = ctx.createLinearGradient(0, y+40, 0, y+hut.h);
    wood.addColorStop(0, "#b07b46");
    wood.addColorStop(1, "#8f5f35");
    ctx.fillStyle = wood;
    ctx.fill();
    ctx.strokeStyle = "rgba(60,30,10,0.25)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = "#7c3f2a";
    ctx.beginPath();
    ctx.moveTo(x - 10, y + 50);
    ctx.lineTo(x + hut.w/2, y);
    ctx.lineTo(x + hut.w + 10, y + 50);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = "rgba(30,10,5,0.25)";
    ctx.stroke();

    ctx.fillStyle = "#6b7280";
    roundRect(x + hut.w - 55, y + 10, 22, 34, 6);
    ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.18)";
    ctx.stroke();

    const d = hut.door;
    roundRect(d.x - camera.x, d.y - camera.y, d.w, d.h, 10);
    const doorG = ctx.createLinearGradient(0, d.y - camera.y, 0, d.y - camera.y + d.h);
    doorG.addColorStop(0, "#8b5a2b");
    doorG.addColorStop(1, "#6f431f");
    ctx.fillStyle = doorG;
    ctx.fill();
    ctx.strokeStyle = "rgba(50,20,5,0.25)";
    ctx.stroke();

    ctx.fillStyle = "#fbbf24";
    ctx.beginPath();
    ctx.arc((d.x - camera.x) + d.w - 12, (d.y - camera.y) + d.h/2, 4, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "rgba(255,255,255,0.25)";
    roundRect(x + 18, y + 76, 52, 34, 10);
    ctx.fill();

    for (const o of hutOscypki) drawOscypek(o.x - camera.x, o.y - camera.y, o.r);

    ctx.fillStyle = "rgba(255,255,255,0.85)";
    roundRect(x + 18, y + 48, 78, 22, 10);
    ctx.fill();
    ctx.fillStyle = "#111827";
    ctx.font = "12px system-ui, sans-serif";
    ctx.fillText("OSCYPKI", x + 28, y + 64);
  }

  function drawSmoke() {
    for (const s of smoke) {
      ctx.fillStyle = `rgba(255,255,255,${s.a})`;
      ctx.beginPath();
      ctx.ellipse(s.x - camera.x, s.y - camera.y, s.r*1.2, s.r, 0, 0, Math.PI*2);
      ctx.fill();
    }
  }

  function drawSplashes() {
    for (const s of splashes) {
      ctx.fillStyle = `rgba(255,255,255,${s.a})`;
      ctx.beginPath();
      ctx.arc(s.x - camera.x, s.y - camera.y, s.r, 0, Math.PI*2);
      ctx.fill();
    }
  }

  function drawBrokenHeartFX() {
    if (!heartFx.active) return;
    const t = heartFx.t;
    const x = heartFx.x - camera.x;
    const y = heartFx.y - camera.y - (40 - t)*0.8;

    ctx.save();
    ctx.globalAlpha = clamp(t/40, 0, 1);
    ctx.font = "28px system-ui, sans-serif";
    ctx.fillText("💔", x - 14, y);
    ctx.restore();

    heartFx.t -= 1;
    if (heartFx.t <= 0) heartFx.active = false;
  }

  function drawHUD() {
    ctx.save();
    ctx.fillStyle = "#0b1220";
    ctx.fillRect(0, 0, W, 56);

    ctx.fillStyle = "#ffffff";
    ctx.textBaseline = "top";

    ctx.font = "20px monospace";
    ctx.fillText("TECHICHI", 18, 10);

    const ox = 180, oy = 14;
    ctx.fillStyle = "#f4d27a";
    ctx.beginPath();
    ctx.ellipse(ox, oy + 10, 9, 7, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = "rgba(0,0,0,0.35)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = "#ffffff";
    ctx.font = "20px monospace";
    ctx.fillText("x " + String(player.totalScore).padStart(2,"0"), 200, 10);

    ctx.fillText("WORLD", W/2 - 70, 10);
    ctx.fillText(String(level) + "-1", W/2 - 38, 32);

    const need = requiredForLevel(level);
    ctx.font = "20px monospace";
    ctx.fillText("CEL", W - 300, 10);
    ctx.fillText(`${String(player.roundScore).padStart(2,"0")}/${String(need).padStart(2,"0")}`, W - 260, 10);

    ctx.font = "20px monospace";
    ctx.fillText("LIFE", W - 180, 10);
    ctx.font = "20px system-ui, sans-serif";
    ctx.fillText(livesToHearts(player.lives), W - 120, 10);

    ctx.font = "20px monospace";
    ctx.fillText("TIME", W - 180, 32);
    ctx.fillText(formatTimeLeft(),  W - 120, 32);

    ctx.restore();
  }

  function update(dt) {
    if (paused) return;

    if (!gameOver) {
      updatePlatforms(dt);

      timeLeft -= dt;
      if (timeLeft <= 0) {
        timeLeft = 0;
        onTimeOut();
      }

      updatePlayer();
      updateCats();
      updateBullets();
    }

    if (Math.random() < 0.55) spawnSmoke();
    for (const s of smoke) {
      s.x += s.vx; s.y += s.vy;
      s.r *= 1.003; s.a *= 0.992; s.life -= 1;
    }
    smoke = smoke.filter(s => s.life > 0 && s.a > 0.05);

    for (const s of splashes) {
      s.x += s.vx;
      s.y += s.vy;
      s.vy += 0.18;
      s.a *= 0.96;
      s.life -= 1;
    }
    splashes = splashes.filter(s => s.life > 0 && s.a > 0.05);

    camera.x = clamp(player.x - 260, 0, 1950);
  }

  function draw() {
    ctx.clearRect(0,0,W,H);
    drawBackground();

    for (const p of platforms) drawPlatform(p);

    drawSpikes();
    drawCollectibles();
    drawHut();
    drawSmoke();

    for (const c of cats) if (c.alive) drawCat(c);
    drawBullets();

    if ((player.invuln > 0) && (Math.floor(player.invuln/6) % 2 === 0)) {
      // blink
    } else {
      if (player.alive || player.won) drawChihuahua(player.x, player.y, -player.face);
    }

    drawSplashes();
    drawBrokenHeartFX();
    drawHUD();

    if (gameOver && level !== 5) {
      ctx.fillStyle = "rgba(17,24,39,0.35)";
      ctx.fillRect(0,0,W,H);
      ctx.fillStyle = "rgba(255,255,255,0.92)";
      roundRect(W/2 - 260, H/2 - 70, 520, 140, 18);
      ctx.fill();
      ctx.fillStyle = "#111827";
      ctx.font = "20px system-ui, sans-serif";
      ctx.fillText(
        player.won ? `Wygrana! Zebrane oscypki: ${player.totalScore} 🧀` : "Koniec gry! Brak serc 💔",
        W/2 - 200, H/2 - 18
      );
      ctx.font = "14px system-ui, sans-serif";
      ctx.fillText("Kliknij „Restart rundy” lub wciśnij R.", W/2 - 160, H/2 + 16);
    }
  }

  let lastT = 0;
  function loop(t) {
    const now = t || performance.now();
    const dt = lastT ? (now - lastT) / 1000 : 0;
    lastT = now;

    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  // start
  reset();
  loop();

})();
</script>
</body>
